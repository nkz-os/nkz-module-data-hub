---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datahub-api
  namespace: nekazari
  labels:
    app: datahub-api
    component: backend
    module: datahub
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: datahub-api
  template:
    metadata:
      labels:
        app: datahub-api
        component: backend
        module: datahub
    spec:
      containers:
        - name: api
          image: ghcr.io/nkz-os/nkz-module-data-hub/datahub-backend@sha256:bf2a423de5371f1f1524f0dc788b43d8d97828f895d4a960ce2a23758136957a
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: datahub-api-config
          env:
            - name: CONTEXT_URL
              valueFrom:
                configMapKeyRef:
                  name: nekazari-config
                  key: CONTEXT_URL
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "256Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: datahub-api-service
  namespace: nekazari
spec:
  selector:
    app: datahub-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
